- name: Add PostgreSQL.org repository
  become: yes
  ansible.builtin.deb822_repository:
    name: postgresql
    types: deb
    uris: https://apt.postgresql.org/pub/repos/apt
    suites: '{{ ansible_distribution_release }}-pgdg'
    components: main
    signed_by: https://www.postgresql.org/media/keys/ACCC4CF8.asc
  when: "arvados_postgresql_repository == 'postgresql'"
  register: postgresql_apt_repo

- name: Cache PostgreSQL.org repository
  when: postgresql_apt_repo.changed
  become: yes
  ansible.builtin.apt:
    update_cache: yes
