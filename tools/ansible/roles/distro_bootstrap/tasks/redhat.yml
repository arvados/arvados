- name: Bootstrap packages
  become: yes
  ansible.builtin.raw: "{{ distro_bootstrap_dnf_command }} {{ item }}"
  loop:
    - makecache
    - "install {{ distro_bootstrap_dnf_packages|map('quote')|join(' ') }}"
