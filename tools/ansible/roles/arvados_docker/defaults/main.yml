arvados_compute_pin_packages: true
docker_apt_url: "https://download.docker.com/linux/{{ ansible_distribution|lower }}"
docker_dnf_url: "https://download.docker.com/linux/rhel"
# Packages to be installed with (optionally) their required version spec. Use empty string
# when no specific version is needed.
docker_dnf_packages:
  containerd.io: "1.7.*"
  docker-ce: "3:28.*"
  docker-ce-cli: "1:28.*"
  docker-ce-rootless-extras: "28.*"